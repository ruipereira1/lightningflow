<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#09090b"/>
      <stop offset="100%" style="stop-color:#18181b"/>
    </linearGradient>
    <linearGradient id="bolt" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Subtle grid lines -->
  <g stroke="rgba(139,92,246,0.08)" stroke-width="1">
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
  </g>
  <!-- Glow circle -->
  <circle cx="256" cy="256" r="160" fill="rgba(139,92,246,0.06)"/>
  <!-- Lightning bolt -->
  <polygon points="295,80 175,275 245,275 215,432 345,230 265,230" fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Inner highlight -->
  <polygon points="295,80 175,275 245,275 215,432 345,230 265,230" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
</svg>
